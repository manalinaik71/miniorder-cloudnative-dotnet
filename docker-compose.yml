

services:
  postgres:
    image: postgres:16
    container_name: catalog-postgres
    environment:
      POSTGRES_DB: catalogdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/Catalog.Api/Dockerfile
    container_name: existing-catalog-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=catalogdb;Username=app;Password=app123
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  catalog-service:
    build: 
      context: ./src/catalog-service/Catalog.Api
      dockerfile: Dockerfile
    container_name: catalog-api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
  
  order-service:
    build: 
      context: ./src/order-service/Order.Api
      dockerfile: Dockerfile
    container_name: order-api
    ports: 
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"

volumes:
  pgdata: